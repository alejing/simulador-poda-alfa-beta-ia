<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="#0f172a" />
  <!-- Max Triangle -->
  <polygon points="50,15 85,75 15,75" fill="none" stroke="url(#grad)" stroke-width="8" stroke-linejoin="round" />
  <!-- Alpha & Beta text -->
  <text x="50" y="52" font-family="sans-serif" font-weight="bold" font-size="28" fill="#3b82f6" text-anchor="middle">α</text>
  <text x="50" y="72" font-family="sans-serif" font-weight="bold" font-size="20" fill="#10b981" text-anchor="middle">β</text>
</svg>
